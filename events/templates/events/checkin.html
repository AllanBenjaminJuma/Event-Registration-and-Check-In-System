{% extends 'events/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-sm">

            <div class="card-body text-center">

                <h3 class="mb-3">
                    Event Check-In
                </h3>

                <!-- MESSAGE -->
                {% if message %}

                    {% if success %}
                        <div class="alert alert-success">
                            {{ message }}
                        </div>
                    {% else %}
                        <div class="alert alert-danger">
                            {{ message }}
                        </div>

                        <!-- REGISTER BUTTON ONLY ON ERROR -->
                        <a href="{% url 'event_detail' event.id %}" class="btn btn-primary mt-2 w-100">
                            Register for this Event
                        </a>

                    {% endif %}

                {% endif %}

                <!-- CHECK-IN FORM -->
                <form method="POST" class="mt-3">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label>Email or Phone Number</label>

                        <input
                            type="text"
                            name="identifier"
                            class="form-control"
                            placeholder="Enter email or phone used during registration"
                            required
                        >

                    </div>

                    <button class="btn btn-success w-100">
                        Confirm Check-In
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
