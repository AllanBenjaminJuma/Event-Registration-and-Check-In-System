{% extends 'events/base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h2 class="event-title m-0">
        Past Events
    </h2>

    <a href="{% url 'event_list' %}"
       class="btn btn-outline-light">
        Upcoming Events
    </a>

</div>

<div class="row">

    {% for event in events %}

    <div class="col-md-4">

        <div class="card shadow-sm mb-3">

            <div class="card-body">

                <h5 class="card-title">
                    {{ event.title }}
                </h5>

                <p class="card-text">
                    📍 {{ event.location }}<br>
                    📅 {{ event.date|date:"d M Y" }}
                </p>

                <span class="badge bg-secondary">
                    Event Completed
                </span>

            </div>

        </div>

    </div>

    {% empty %}

    <div class="col-12">

        <div class="alert alert-info">
            No past events found.
        </div>

    </div>

    {% endfor %}

</div>

{% endblock %}
